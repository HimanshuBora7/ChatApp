<!DOCTYPE html>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Chat Hub</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background: #ffffff;
            color: #000000;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border: 2px solid #000000;
            border-radius: 2px;
        }

        h2 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
            color: #000000;
        }

        #chat-box {
            height: 320px;
            border: 2px solid #000000;
            background: #fafafa;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            display: flex;
            margin-bottom: 12px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            background: #f5f5f5;
        }

        button {
            padding: 12px 24px;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #ffffff;
            color: #000000;
        }

        .system-msg {
            color: #666666;
            text-align: center;
            margin: 8px 0;
            font-size: 13px;
            border-top: 1px dashed #000000;
            border-bottom: 1px dashed #000000;
            padding: 4px 0;
            font-style: italic;
        }

        .msg {
            margin: 6px 0;
            padding: 10px 14px;
            max-width: 80%;
            width: fit-content;
            font-size: 14px;
            line-height: 1.4;
        }

        /* High-Contrast Message Blocks */
        .msg-inbound {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            align-self: flex-start;
        }

        .msg-outbound {
            background: #000000;
            color: #ffffff;
            margin-left: auto;
            align-self: flex-end;
        }
        .video-container{
            display: none;

            grid-template-columns:1fr 1fr ;
            gap: 10px;
            margin-bottom: 15px;

        }
        .video-container.active{
            display: grid;
        }
        video{
            width: 100%;
            height: 140px;
            background: #000000;
            border: 2px solid #000000;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ChatApp</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Your username (e.g., Alpha)">
        <button onclick="connectToServer()">Sign In</button>
    </div>
    <div class="video-container" id="videoArea">

        <div>
            <label>Local Stream</label>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <label>Remote Feed</label>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div style="grid-column: span 2;text-align: center;margin-top: 10px;">
            <button onclick="terminateActiveCall()" style="background: red;color:white;border-color: black;width: 100% ">end Transmission</button>
        </div>
    </div>
    <div id="chat-box">
        <div class="system-msg">Please sign in to start chatting.</div>
    </div>

    <div class="input-group">
        <input type="text" id="targetUser" placeholder="Recipient's username (e.g., Bravo)">
        <button onclick="initiateCallRequest()" style="background: #ffffff;color: #000000">Call</button>
    </div>
    <div class="input-group">
        <input type="text" id="messageText" placeholder="Type your message here...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="outgoingCallModel" style="display: none;position: fixed;top:0;left: 0;width: 100%;height: 100%;background: rgba(255,255,255,0.9);z-index: 1000;align-items: center;justify-content: center;flex-direction: column;border: 2px solid #000;">
    <h3 style="text-transform: uppercase;letter-spacing: 1px;">Select Connection types</h3>
    <div class="input-group" style="justify-content: center">
    <button onclick="executeMediaDial('video')">Video Call</button>
        <button onclick="executeMediaDial('audio')" style="background: #fff;color: #000;">Voice only</button>
        <button onclick="closeModal('outgoingCallModal')" style="background: red;color: #fff;border-color: red">Cancel

        </button>


    </div>

</div>
<div id="incomingCallModal" style="display: none;position: fixed;top:0;left:0;width: 100%;height: 100%;background: rgba(255,255,255,0.9);z-index: 1000;align-items: center;justify-content: center;flex-direction: column;border: 2px solid #000">
    <h3 style="text-transform: uppercase;letter-spacing: 1px" id="calleridentityLabel">Incoming Call...</h3>
    <div class="input-group" style="justify-content: center;">
        <button onclick="acceptIncomingCall()">Accept</button>
        <button onclick="declineIncomingCall()" style="background: red;color: #fff;border-color: red">Decline</button>
    </div>

</div>

<script>
    let socket = null;
    let myUsername = "";
    let peer = null; //for storing our WebRtc orchestration engine instance
    let localStream = null; //will store our raw camera/microphopne data stream

    let activeCallObject = null; //hold the active peerKs call instance
    let pendingIncomingCall = null; //temporarily holds the call while ringing
    async function connectToServer() {
        myUsername = document.getElementById("username").value.trim();
        if (!myUsername) return alert("Please enter a username!");

        const sharedSecret = "secret-key-hardcoded";
        await generateSecureKey(sharedSecret);

        socket = new WebSocket(`ws://localhost:7070/chat/${myUsername}`);

        socket.onopen = () => {
            logSystemMessage(`Connected as <b>${myUsername}</b>`);
            peer = new Peer(myUsername);

            setupIncomingCallListener();
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);

            const decryptedText = await decryptMessage(data.message,data.iv);
            logIncomingMessage(data.sender, decryptedText);
        };

        socket.onclose = () => {
            logSystemMessage(`Disconnected from server.`);
        };
    }

    async function sendMessage() {
        const target = document.getElementById("targetUser").value.trim();
        const message = document.getElementById("messageText").value.trim();

        if (!socket || socket.readyState !== WebSocket.OPEN) return alert("Connect to server first!");
        if (!target || !message) return alert("Fill in recipient and message details!");

        const encryptedData = await encryptMessage(message);
        if(!encryptedData) return;

        const packet = {
            sender: myUsername,
            target: target,
            message: encryptedData.ciphertext,iv:encryptedData.iv
        };

        socket.send(JSON.stringify(packet));

        logOutgoingMessage(target, message);
        document.getElementById("messageText").value = "";
    }

    function logSystemMessage(text) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="system-msg">${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function logIncomingMessage(sender, msg) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="msg msg-inbound"><b>${sender}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function logOutgoingMessage(target, msg) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="msg msg-outbound"><b>You (to ${target}):</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
    let cryptokey = null;
    async function generateSecureKey(rawPassword){
        const encoder = new TextEncoder();
        const passwordBytes = encoder.encode(rawPassword);

        const hash = await window.crypto.subtle.digest('SHA-256',passwordBytes);

        cryptokey = await  window.crypto.subtle.importKey(
            "raw",hash,{
                name:"AES-GCM"
            },false,["encrypt","decrypt"]
        );
        console.log("System: Cryptographic key sucessfully initalized");
    }
    async function encryptMessage(plainText){
        if(!cryptokey){
            alert("cryptographic key not initialized");
            return null;
        }
        const encoder = new TextEncoder();
        const dataBytes = encoder.encode(plainText);

        //generating a unique,random 12bytes initialization vector iv
        const iv = window.crypto.getRandomValues(new Uint8Array(12));

        //encrypting the raw bytes using AES-GCM
        const encryptedBuffer = await window.crypto.subtle.encrypt(
            {
                name: "AES-GCM",
                iv: iv //passing random IV container
            },
            cryptokey,
            dataBytes
        );
        // Convert the binary encrypted data and IV into Base64 strings
        // (Networks handle standard strings much better than raw binary buffers)
        const encryptedBytes = new Uint8Array(encryptedBuffer);
        const base64Ciphertext = btoa(String.fromCharCode(...encryptedBytes));
        const base64Iv = btoa(String.fromCharCode(...iv));

        return {
            ciphertext: base64Ciphertext,
            iv: base64Iv
        };

    }

    async function decryptMessage(ciphertextBase64,ivBase64){
        if (!cryptokey) {
            console.error("Cryptographic key not initialized!");
            return "[Error: Unable to decrypt]";
        }
        try {
            const encryptedBytes = new Uint8Array(atob(ciphertextBase64).split("").map(c => c.charCodeAt(0)));
            const ivBytes = new Uint8Array(atob(ivBase64).split("").map(c => c.charCodeAt(0)));

            const decryptedBuffer = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: ivBytes
                },
                cryptokey,
                encryptedBytes
            );

            const decoder = new TextDecoder();
            return decoder.decode(decryptedBuffer);
        } catch (e) {
            console.error("Decryption failed:", e);
            return "[Decryption Error: Key mismatch or tampered data]";
        }

    }

    function initiateCallRequest(){
        const target = document.getElementById("targetUser").value.trim();
        if(!target) return alert ("Enter recipient's username before calling!");

        logSystemMessage(`dialing the user [${target}]....`);

        navigator.mediaDevices.getUserMedia({video:true,audio:true}).then((stream)=>{
            localStream = stream;

            // displaying our local feed
            document.getElementById("localVideo").srcObject = stream;

            const call = peer.call(target,localStream);

            if(call){
                call.on('stream',(remoteStream)=>{
                    document.getElementById("videoArea").classList.add("active");
                    document.getElementById("remoteVideo").srcObject = remoteStream;
                });
            }
            else{
                logSystemMessage("System error: handshake routing failed.")
            }
        })
            .catch((err)=>{
                alert("failed to access camera/microphone");
                console.error(err);
            })
    }
    function setupIncomingCallListener(){
        peer.on('call',(incomingCall)=>{
            //popup for asking the consent from the receiver
            const acceptCall = confirm(`incoming video call from ${incomingCall.peer}, Accept ?`)
            if(acceptCall){
                logSystemMessage("media handshake accepted. initializing local feed...");
                //capture receiver's feed and transmit it back to the caller

                navigator.mediaDevices.getUserMedia({video:true,audio:true}).then((stream)=>{
                    localStream = stream;

                    //unhide the video layout

                    document.getElementById("videoArea").classList.add("active");
                    document.getElementById("localVideo").srcObject = stream;

                    //answer the link and transmit our stream back to the caller
                    incomingCall.answer(localStream);

                    //hook into alpha's streaming data payload when it lands

                    incomingCall.on('stream',(remoteStream) =>{
                        document.getElementById("remoteVideo").srcObject = remoteStream
                    });
                })
                    .catch((err) =>{
                        alert("could not initalize local media device for the call");
                    })
            }else{
                logSystemMessage("incoming call request denied")
            }
        })
    }
</script>
</body>
</html>
