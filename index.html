<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo Chat Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background: #e5ddd5; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { height: 300px; border: 1px solid #ddd; background: #f0f0f0; overflow-y: auto; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .input-group { display: flex; margin-bottom: 10px; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 10px 20px; background: #075e54; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
        .system-msg { color: #555; font-style: italic; text-align: center; margin: 5px 0; font-size: 13px; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; max-width: 80%; width: fit-content; }
        .msg-inbound { background: #fff; align-self: flex-start; border: 1px solid #e0e0e0; }
        .msg-outbound { background: #dcf8c6; margin-left: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>WhatsApp Demo: Step 1</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Your username (e.g., Alice)">
        <button onclick="connectToServer()">Sign In</button>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="chat-box">
        <div class="system-msg">Please sign in to start chatting.</div>
    </div>

    <div class="input-group">
        <input type="text" id="targetUser" placeholder="Recipient's username (e.g., Bob)">
    </div>
    <div class="input-group">
        <input type="text" id="messageText" placeholder="Type your message here...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let socket = null;
    let myUsername = "";

    function connectToServer() {
        myUsername = document.getElementById("username").value.trim();
        if (!myUsername) return alert("Please enter a username!");

        // Connect to your running Java Javalin server
        socket = new WebSocket(`ws://localhost:7070/chat/${myUsername}`);

        socket.onopen = () => {
            logSystemMessage(`Connected as <b>${myUsername}</b>`);
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            logIncomingMessage(data.sender, data.message);
        };

        socket.onclose = () => {
            logSystemMessage(`Disconnected from server.`);
        };
    }

    function sendMessage() {
        const target = document.getElementById("targetUser").value.trim();
        const message = document.getElementById("messageText").value.trim();

        if (!socket || socket.readyState !== WebSocket.OPEN) return alert("Connect to server first!");
        if (!target || !message) return alert("Fill in recipient and message details!");

        const packet = {
            sender: myUsername,
            target: target,
            message: message
        };

        // Convert JSON object to a string and send over WebSocket pipeline
        socket.send(JSON.stringify(packet));

        logOutgoingMessage(target, message);
        document.getElementById("messageText").value = "";
    }

    function logSystemMessage(text) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="system-msg">${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function logIncomingMessage(sender, msg) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="msg msg-inbound"><b>${sender}:</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function logOutgoingMessage(target, msg) {
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="msg msg-outbound"><b>You (to ${target}):</b> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
